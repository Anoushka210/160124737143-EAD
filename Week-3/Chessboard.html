<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chessboard Pattern</title>
    <style>
        /* Container for the board */
        #board {
            width: 400px;
            height: 400px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 5px solid #333;
            margin: 50px auto;
        }

        /* Base style for every square */
        .square {
            width: 100%;
            height: 100%;
        }

        /* Background colors for white and black squares */
        .white { background-color: #f0d9b5; }
        .black { background-color: #b58863; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Chessboard using HTML & CSS</h2>

    <div id="board">
        <!-- Row 1 -->
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>
        
        <!-- Row 2 -->
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>

        <!-- Row 3 -->
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>

        <!-- Row 4 -->
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>

        <!-- Row 5 -->
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>

        <!-- Row 6 -->
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>

        <!-- Row 7 -->
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>
        <div class="square white"></div><div class="square black"></div>

        <!-- Row 8 -->
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>
        <div class="square black"></div><div class="square white"></div>
    </div>

</body>
</html>
